<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>峇厘島九日療癒之旅 🐕 | 林北家族手札</title>
    
    <!-- 引入核心庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Noto+Sans+TC:wght@400;700;900&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --portal-bg: #fdfbf7;
            --bali-green: #2d6a4f;
            --bali-orange: #ff9f1c;
            --bali-teal: #2ec4b6;
        }

        body {
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
            background-color: var(--portal-bg);
            background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png");
            color: #333;
            overflow-x: hidden;
        }

        .font-handwritten { font-family: 'Patrick Hand', cursive; }
        
        /* 捲軸美化 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #d6c0ae; border-radius: 20px; }

        /* 卡片懸浮與陰影 */
        .travel-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-image: url("https://www.transparenttextures.com/patterns/cream-paper.png");
        }
        .travel-card:hover {
            transform: translateY(-8px) rotate(1deg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        /* 波浪背景裝飾 */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #e0f2f1 0%, #fffde7 100%);
            clip-path: ellipse(100% 60% at 50% 30%);
            z-index: -1;
        }

        .highlight-text {
            background: linear-gradient(to top, rgba(255, 159, 28, 0.2) 40%, transparent 40%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion || window.FramerMotion || {};

        // --- 主站素材定義 ---
        const PORTAL_ASSETS = {
            paper: "https://www.transparenttextures.com/patterns/cream-paper.png",
            stamp1: "https://drive.google.com/file/d/1A7Zc3ZqsP3oJ528Jzq3D1SOt6T0Z0mLl/view?usp=drive_link",
            stamp2: "https://drive.google.com/file/d/1BS652qurVrAzMF21_7NdA9-fs9CLj2tW/view?usp=drive_link",
            groupMascot: "https://drive.google.com/file/d/14Q2vRY9Entm6z7aH507IQhh9GUmSOty-/view?usp=drive_link",
            car: "https://drive.google.com/file/d/1CgYcC1dBERj6CpVSBjrMTBsiknmUeVc_/view?usp=drive_link"
        };

        const resolveImage = (url) => {
            if (!url) return '';
            if (url.includes("drive.google.com")) {
                const idMatch = url.match(/\/d\/([^/]+)/);
                if (idMatch && idMatch[1]) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w1000`;
            }
            return url;
        };

        // --- 行程數據 (精確同步 Word 內容) ---
        const scheduleData = [
            { 
                day: 1, date: "4/25 (六)", 
                title: "抵達水明漾，高空夕陽晚餐", 
                highlights: ["CI771", "MoonLite 夕陽"],
                items: [
                    { time: "05:10", text: "機場早餐: Table Joe 喬桌子廚房", icon: "🍳" },
                    { time: "09:10", text: "CI771 啟航 (14:35 抵達)", icon: "✈️" },
                    { time: "16:00", text: "入住 Courtyard Seminyak 飯店休息", icon: "🏨" },
                    { time: "17:30", text: "晚餐: MoonLite Kitchen (走路5分鐘)", icon: "🌇" }
                ],
                color: "bg-orange-400",
                note: "第一天我們主打「夕陽晚餐」，開場就要有最高級的享受！"
            },
            { 
                day: 2, date: "4/26 (日)", 
                title: "文青早午餐＋海邊俱樂部", 
                highlights: ["Bo and Bun", "Potato Head"],
                items: [
                    { time: "09:30", text: "Titik Temu Coffee 冠軍手沖咖啡", icon: "☕" },
                    { time: "13:00", text: "午餐: Bo and Bun 越式料理 (已預約)", icon: "🥗" },
                    { time: "15:00", text: "Seminyak Village 逛街 / Lluvia Spa", icon: "💆" },
                    { time: "Sunset", text: "Potato Head Beach Club 享受日落", icon: "🍹" }
                ],
                color: "bg-teal-500",
                note: "Potato Head 記得要佔草皮區的位置，邊喝飲料邊看日落超 Chill。"
            },
            { 
                day: 3, date: "4/27 (一)", 
                title: "斷崖絕景：透明泳池與火舞", 
                highlights: ["One Eighty", "Kecak Dance"],
                items: [
                    { time: "09:30", text: "包車出發: 神鷹廣場 (GWK)", icon: "🗿" },
                    { time: "14:45", text: "One Eighty 懸崖透明泳池 (已預約)", icon: "🏊" },
                    { time: "18:00", text: "烏魯瓦圖廟觀看 Kecak 火舞表演", icon: "🔥" },
                    { time: "20:00", text: "晚餐: Moggumung 韓式烤肉滿足靈魂", icon: "🥩" }
                ],
                color: "bg-rose-500",
                note: "這天視覺衝擊最強，透明懸崖泳池是拍照熱點！"
            },
            { 
                day: 4, date: "4/28 (二)", 
                title: "前進烏布：走入綠意梯田", 
                highlights: ["Cretya Ubud", "烏布手作"],
                items: [
                    { time: "09:00", text: "移動至烏布: 德哥拉朗梯田 (Alas Harum)", icon: "🌿" },
                    { time: "Lunch", text: "Cretya Ubud 梯田美景午餐", icon: "🍛" },
                    { time: "Afternoon", text: "烏布皇宮 / 傳統市場 / Seniman Coffee", icon: "🎭" },
                    { time: "17:30", text: "晚餐: Kebun Bistro (南法風情小酒館)", icon: "🍷" }
                ],
                color: "bg-emerald-600",
                stay: "Adiwana Suweta",
                note: "住在蘇維塔阿迪瓦納，每天早餐都是在叢林環抱中享用。"
            },
            { 
                day: 5, date: "4/29 (三)", 
                title: "超療癒：狗狗瑜珈與聖猴森林", 
                highlights: ["Puppy Yoga", "Monkey Forest"],
                items: [
                    { time: "11:30", text: "午餐: Pison Cafe (已 Whatsapp 訂位)", icon: "🥞" },
                    { time: "13:30", text: "亮點行程: Puppy Yoga 狗狗瑜珈", icon: "🐶" },

                title: "瀑布巡禮：水聲與五星萬麗",

                items: [

                    { time: "12:00", text: "退房並前往機場 (CI772 15:55 起飛)", icon: "✈️" }

                                <img src={resolveImage(PORTAL_ASSETS.groupMascot)} className="w-32 h-32 mx-auto drop-shadow-2xl animate-wobble" />

                            <span className="bg-white/80 px-3 py-1 rounded-full border border-stone-100 shadow-sm">4/25 - 5/03</span>

                        <div className="travel-card bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <div className="text-xs font-black text-stone-400 uppercase tracking-widest mb-2">機票航班</div>
                            <div className="space-y-3">
                                <div className="flex justify-between items-center">
                                    <span className="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded text-[10px] font-bold">去程 CI771</span>
                                    <span className="font-black text-stone-700">09:10 - 14:35</span>
                                </div>
                                <div className="flex justify-between items-center">
                                    <span className="bg-orange-50 text-orange-700 px-2 py-0.5 rounded text-[10px] font-bold">回程 CI772</span>
                                    <span className="font-black text-stone-700">15:55 - 21:20</span>
                                </div>
                            </div>
                        </div>

                        <div className="travel-card bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <div className="text-xs font-black text-stone-400 uppercase tracking-widest mb-2">預估費用 / 人</div>
                            <div className="flex items-center gap-3">
                                <span className="text-3xl font-black text-emerald-600">NT$ 40,359</span>
                                <span className="text-[10px] text-stone-400 font-bold leading-tight">含機+酒+交+保+網<br/>(不含餐)</span>
                            </div>
                        </div>

                        <div className="travel-card bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
                            <div className="text-xs font-black text-stone-400 uppercase tracking-widest mb-2">移動路線</div>
                            <div className="flex items-center gap-2 text-sm font-bold text-stone-600">
                                Seminyak <span className="text-stone-300">→</span> Ubud <span className="text-stone-300">→</span> Nusa Dua
                            </div>
                        </div>
                    </section>

                    {/* 每日行程 */}
                    <section className="max-w-4xl mx-auto px-6 relative z-10">
                        <div className="flex items-center gap-4 mb-10">
                            <h2 className="text-2xl font-black text-stone-700">行程細節</h2>
                            <div className="flex-1 h-[2px] bg-stone-100"></div>
                            <div className="text-stone-300 font-handwritten text-xl tracking-widest uppercase">Itinerary Detail</div>
                        </div>

                        <div className="space-y-6">

                                <div key={idx} className="relative">
                                    {/* 裝飾膠帶 */}
                                    <div className="absolute -top-3 left-10 w-24 h-8 bg-yellow-200/40 mix-blend-multiply z-20 pointer-events-none origin-left -rotate-2"

                                    <div className={`bg-white rounded-[2rem] border-2 border-stone-100 p-6 shadow-sm cursor-pointer hover:shadow-md transition-all ${openDay === idx ? 'ring-2 ring-emerald-500/20' : ''}`}

                                                    <span className="text-xl leading-none">{day.day}</span>

</html>
