        .font-handwritten { font-family: 'Patrick Hand', cursive; }
        
        /* 高級感卡片設計 */

        .source-link {

            align-items: center;

            padding: 5px 12px;
            background: #f0fdf4;
            border: 1.5px solid #dcfce7;
            border-radius: 10px;
            color: #166534;
            font-size: 0.8rem;

            border-color: #4ade80;

        .wave-decoration {

            left: 0;
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, rgba(45, 106, 79, 0.1) 0%, rgba(255, 255, 255, 0) 100%);
