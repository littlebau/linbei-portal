    <style>

            overflow-x: hidden;

        .font-handwritten { font-family: 'Patrick Hand', cursive; }
        
        .travel-card {

        .travel-card:hover {

        .bali-gradient-bg {

            background-color: #ecfdf5;
            color: #047857;
            transform: scale(1.02);

            width: 8px;

            return url;

                                </div>

                            <img src={resolveImage(PORTAL_ASSETS.stamp2)} className="absolute bottom-4 right-4 w-40 h-40 opacity-10 invert rotate-[-20deg]" />
                        </div>
                    </section>

                    <footer className="mt-20 py-16 text-center text-stone-400 bg-white/30 backdrop-blur-sm">
                        <p className="font-handwritten text-3xl mb-3 text-emerald-800/40 tracking-widest">Travel with Love & Shiba 🐕</p>
                        <p className="text-[11px] uppercase tracking-[0.6em] font-black opacity-50">© 2026 LINBEI FAMILY TRAVEL PORTAL</p>
                    </footer>

                    {/* 漂浮互動吉祥物 */}
                    <div className="fixed bottom-8 right-8 z-[100] cursor-pointer group" onClick={() => {
                        const msgs = ['Puppy Yoga 記得帶襪子！', '這連結點進去很精彩喔', '峇里島真的很 Chill~', '出發前記得檢查護照！🐾'];
                        const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
                        // 使用自訂浮動提示替代 alert
                        const bubble = document.getElementById('shiba-bubble');
                        bubble.innerText = randomMsg;
                        bubble.style.opacity = '1';
                        setTimeout(() => bubble.style.opacity = '0', 3000);
                    }}>
                        <div id="shiba-bubble" className="absolute -top-16 right-0 bg-white px-4 py-2 rounded-2xl shadow-xl border-2 border-emerald-100 text-sm font-bold text-emerald-600 whitespace-nowrap opacity-0 transition-opacity duration-300">
                            汪！汪！
                        </div>
                        <motion.div animate={{ y: [0, -12, 0], rotate: [0, 5, -5, 0] }} transition={{ repeat: Infinity, duration: 4 }}>
                            <img src={resolveImage(PORTAL_ASSETS.groupMascot)} className="w-20 h-20 drop-shadow-2xl hover:scale-110 transition-transform" />
                        </motion.div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
